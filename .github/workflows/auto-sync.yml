name: Sync All Branches
on:
  schedule:
    - cron: '0 */4 * * *'  # 每4小时同步
  push:
    branches: ['*']         # 任意分支推送时触发
  workflow_dispatch:        # 支持手动触发

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 拉取完整历史
      - name: Push to Mirror
        run: |
          git remote add target https://username:${{ secrets.TARGET_PAT }}@目标平台域名/user/repo.git
          git push target --mirror --force-with-lease
        env:
          GIT_TERMINAL_PROMPT: 0
