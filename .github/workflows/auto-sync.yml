name: 自动同步 main → app

on:
  push:
    branches: [ main ]           # main 有更新时触发
  workflow_dispatch:             # 支持手动触发

jobs:
  sync-to-app:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 同步 main 到 app
        run: |
          git fetch origin
          git checkout app
          git pull origin app --no-rebase
          
          # 合并 main（可改成 rebase）
          git merge origin/main --no-ff -m "chore: auto sync main into app"
          
          git push origin app